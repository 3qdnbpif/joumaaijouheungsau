<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>早買早享受</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&amp;family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans TC', 'Noto Sans JP', system-ui, sans-serif; }
        .tail-container { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #F9F7F2; }
        .card { background: white; border-radius: 20px; box-shadow: 0 4px 12px rgba(92, 107, 106, 0.08); }
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        .photo-item img { width: 100%; height: 200px; object-fit: cover; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-[#F9F7F2]">
    <div class="tail-container flex flex-col">
        <header class="bg-white border-b px-6 py-5">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-bear text-3xl text-[#5C6B6A]"></i>
                    <h1 class="text-2xl font-medium">早買早享受</h1>
                </div>
                <div class="flex gap-4">
                    <button onclick="showExportInfo()" class="text-[#5C6B6A]"><i class="fa-solid fa-download"></i></button>
                    <button onclick="showImportInfo()" class="text-[#5C6B6A]"><i class="fa-solid fa-upload"></i></button>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-5 pb-24">
            <!-- 上傳區域 -->
            <div class="card p-6 mb-8">
                <h2 class="font-medium mb-4">📸 上傳新物品</h2>
                <div onclick="document.getElementById('photo-input').click()" 
                     class="border-2 border-dashed border-neutral-300 rounded-3xl h-52 flex flex-col items-center justify-center cursor-pointer hover:border-[#5C6B6A]">
                    <i class="fa-solid fa-camera text-5xl text-neutral-300 mb-3"></i>
                    <p class="text-neutral-500">拍照或選擇相片</p>
                </div>
                <input type="file" id="photo-input" accept="image/*" class="hidden" onchange="handlePhotoUpload(event)">
                
                <div id="photo-preview" class="hidden mt-4">
                    <p class="text-xs text-neutral-500 mb-2">預覽 (3:4 垂直)</p>
                    <img id="preview-img" class="w-full rounded-2xl">
                </div>
                
                <input id="item-note" type="text" placeholder="備註（可留空）" 
                       class="w-full mt-5 px-5 py-4 border border-neutral-200 rounded-2xl focus:outline-none">
                
                <button onclick="addItem()" class="w-full mt-6 bg-[#5C6B6A] text-white py-4 rounded-2xl font-medium">
                    加入紀錄
                </button>
            </div>

            <div id="purchase-grid" class="photo-grid"></div>
        </main>

        <!-- 底部固定分頁 -->
        <nav class="fixed bottom-0 left-0 right-0 max-w-[480px] mx-auto bg-white border-t">
            <div class="flex text-xs font-medium">
                <div onclick="switchTab(0)" class="flex-1 py-3 flex flex-col items-center nav-active" id="tab-0">全部</div>
                <div onclick="switchTab(1)" class="flex-1 py-3 flex flex-col items-center text-neutral-400" id="tab-1">💸 已俾錢</div>
                <div onclick="switchTab(2)" class="flex-1 py-3 flex flex-col items-center text-neutral-400" id="tab-2">📮 已到貨</div>
                <div onclick="switchTab(3)" class="flex-1 py-3 flex flex-col items-center text-neutral-400" id="tab-3">🏠 返咗屋企</div>
            </div>
        </nav>
    </div>

    <!-- 詳情 Modal -->
    <div id="detail-modal" class="modal">
        <div class="bg-white w-full max-w-[480px] min-h-screen flex flex-col">
            <div class="flex justify-between items-center p-4 border-b">
                <button onclick="closeDetail()" class="text-xl">←</button>
                <h3 class="font-medium">物品詳情</h3>
                <button onclick="deleteCurrentItem()" class="text-red-500">刪除</button>
            </div>
            
            <div class="flex-1 overflow-auto">
                <img id="detail-photo" class="w-full" style="height: 420px; object-fit: cover;">
                
                <div class="p-6">
                    <textarea id="detail-note" class="w-full h-24 p-4 border border-neutral-200 rounded-2xl focus:outline-none" placeholder="備註..."></textarea>
                </div>
            </div>
            
            <div class="p-4 border-t flex justify-between">
                <button onclick="prevItem()" class="w-12 h-12 flex items-center justify-center text-3xl">←</button>
                <button onclick="saveDetail()" class="bg-[#5C6B6A] text-white px-10 py-3 rounded-2xl">儲存修改</button>
                <button onclick="nextItem()" class="w-12 h-12 flex items-center justify-center text-3xl">→</button>
            </div>
        </div>
    </div>

    <input type="file" id="import-input" accept=".json" class="hidden" onchange="importBackup(event)">

    <script>
        let items = [];
        const STORAGE_KEY = "early_buy_items";
        let currentTab = 0;
        let currentDetailIndex = -1;

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) items = JSON.parse(saved);
            renderItems();
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
        }

        let tempPhoto = null;

        function handlePhotoUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(ev) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    // 3:4 垂直比例
                    const targetRatio = 3/4;
                    let w = img.width, h = img.height;
                    if (w / h > targetRatio) w = h * targetRatio;
                    else h = w / targetRatio;
                    
                    canvas.width = w;
                    canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    
                    tempPhoto = canvas.toDataURL('image/jpeg', 0.82);
                    document.getElementById('preview-img').src = tempPhoto;
                    document.getElementById('photo-preview').classList.remove('hidden');
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        function addItem() {
            if (!tempPhoto) return alert("請先上傳照片！");
            items.unshift({
                id: Date.now(),
                note: document.getElementById("item-note").value.trim() || "無備註",
                photo: tempPhoto,
                date: new Date().toISOString()
            });
            saveData();
            resetForm();
            renderItems();
        }

        function resetForm() {
            tempPhoto = null;
            document.getElementById("item-note").value = "";
            document.getElementById('photo-preview').classList.add('hidden');
        }

        function renderItems() {
            const container = document.getElementById("purchase-grid");
            let filtered = items;

            if (currentTab === 1) filtered = items.filter(i => i.paid);
            if (currentTab === 2) filtered = items.filter(i => i.arrived);
            if (currentTab === 3) filtered = items.filter(i => i.home);

            container.innerHTML = filtered.length === 0 ? 
                `<div class="col-span-full text-center py-20 text-neutral-400">暫無紀錄</div>` : "";

            filtered.forEach((item, idx) => {
                const div = document.createElement("div");
                div.className = "photo-item card";
                div.innerHTML = `
                    <img src="${item.photo}" onclick="openDetail(${items.indexOf(item)})">
                    <div class="p-3">
                        <div class="text-sm font-medium">${item.note}</div>
                        <div class="text-xs text-neutral-400 mt-1">${new Date(item.date).toLocaleDateString('zh-TW')}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('nav > div > div').forEach((el, i) => {
                el.classList.toggle('nav-active', i === tab);
                el.classList.toggle('text-neutral-400', i !== tab);
            });
            renderItems();
        }

        // 詳情頁功能
        function openDetail(index) {
            currentDetailIndex = index;
            const item = items[index];
            document.getElementById("detail-photo").src = item.photo;
            document.getElementById("detail-note").value = item.note;
            document.getElementById("detail-modal").style.display = "flex";
        }

        function closeDetail() {
            document.getElementById("detail-modal").style.display = "none";
        }

        function saveDetail() {
            if (currentDetailIndex === -1) return;
            const item = items[currentDetailIndex];
            item.note = document.getElementById("detail-note").value.trim() || "無備註";
            saveData();
            closeDetail();
            renderItems();
        }

        function prevItem() {
            if (currentDetailIndex > 0) openDetail(currentDetailIndex - 1);
        }

        function nextItem() {
            if (currentDetailIndex < items.length - 1) openDetail(currentDetailIndex + 1);
        }

        function deleteCurrentItem() {
            if (currentDetailIndex === -1) return;
            if (confirm("確定刪除此物品？")) {
                items.splice(currentDetailIndex, 1);
                saveData();
                closeDetail();
                renderItems();
            }
        }

        // 備份功能
        function showExportInfo() {
            if (items.length === 0) return alert("無紀錄可備份");
            if (confirm("即將下載備份檔案\n確定？")) exportBackup();
        }

        function exportBackup() {
            const link = document.createElement('a');
            link.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(items, null, 2));
            link.download = `早買早享受_備份_${new Date().toISOString().slice(0,10)}.json`;
            link.click();
        }

        function showImportInfo() {
            if (confirm("還原備份將取代目前所有資料\n確定繼續？")) {
                document.getElementById('import-input').click();
            }
        }

        function importBackup(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    items = JSON.parse(ev.target.result);
                    saveData();
                    renderItems();
                    alert("✅ 還原成功！");
                } catch(err) {
                    alert("檔案錯誤！");
                }
            };
            reader.readAsText(file);
        }

        window.onload = () => {
            loadData();
            switchTab(0);
        };
    </script>
</body>
</html>
