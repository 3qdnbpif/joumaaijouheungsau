<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>早買早享受</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&amp;family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans TC', 'Noto Sans JP', system-ui, sans-serif; }
        .tail-container { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #F9F7F2; }
        .card { background: white; border-radius: 20px; box-shadow: 0 4px 12px rgba(92, 107, 106, 0.08); }
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        .photo-item { position: relative; border-radius: 16px; overflow: hidden; background: white; }
        .photo-item img { width: 100%; height: 150px; object-fit: cover; } /* 1:1 正方形 */
        .nav-active { color: #5C6B6A; border-bottom: 3px solid #5C6B6A; }
    </style>
</head>
<body class="bg-[#F9F7F2]">
    <div class="tail-container flex flex-col">
        <header class="bg-white border-b px-6 py-5">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-bear text-3xl text-[#5C6B6A]"></i>
                    <h1 class="text-2xl font-medium">早買早享受</h1>
                </div>
                <div class="flex gap-4">
                    <button onclick="showExportInfo()" class="text-[#5C6B6A]"><i class="fa-solid fa-download"></i></button>
                    <button onclick="showImportInfo()" class="text-[#5C6B6A]"><i class="fa-solid fa-upload"></i></button>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-5 pb-24">
            <!-- 上傳區域 -->
            <div class="card p-6 mb-8">
                <h2 class="font-medium mb-4">📸 上傳新物品</h2>
                <div onclick="document.getElementById('photo-input').click()" 
                     class="border-2 border-dashed border-neutral-300 rounded-3xl h-52 flex flex-col items-center justify-center cursor-pointer hover:border-[#5C6B6A]">
                    <i class="fa-solid fa-camera text-5xl text-neutral-300 mb-3"></i>
                    <p class="text-neutral-500">拍照或選擇相片</p>
                </div>
                <input type="file" id="photo-input" accept="image/*" class="hidden" onchange="handlePhotoUpload(event)">
                
                <!-- 預覽區 -->
                <div id="photo-preview" class="hidden mt-4">
                    <p class="text-xs text-neutral-500 mb-2">預覽</p>
                    <img id="preview-img" class="w-full h-52 object-cover rounded-2xl">
                </div>
                
                <input id="item-note" type="text" placeholder="備註（可留空）" 
                       class="w-full mt-5 px-5 py-4 border border-neutral-200 rounded-2xl focus:outline-none">
                
                <button onclick="addItem()" class="w-full mt-6 bg-[#5C6B6A] text-white py-4 rounded-2xl font-medium">
                    加入紀錄
                </button>
            </div>

            <div id="purchase-grid" class="photo-grid"></div>
        </main>

        <!-- 底部導航分頁 -->
        <nav class="fixed bottom-0 left-0 right-0 max-w-[480px] mx-auto bg-white border-t">
            <div class="flex text-xs font-medium">
                <div onclick="switchTab(0)" class="flex-1 py-3 flex flex-col items-center nav-active" id="tab-0">
                    <i class="fa-solid fa-list text-lg"></i>
                    <span>全部</span>
                </div>
                <div onclick="switchTab(1)" class="flex-1 py-3 flex flex-col items-center text-neutral-400" id="tab-1">
                    <span class="text-xl">💸</span>
                    <span>已俾錢</span>
                </div>
                <div onclick="switchTab(2)" class="flex-1 py-3 flex flex-col items-center text-neutral-400" id="tab-2">
                    <span class="text-xl">📮</span>
                    <span>已到貨</span>
                </div>
                <div onclick="switchTab(3)" class="flex-1 py-3 flex flex-col items-center text-neutral-400" id="tab-3">
                    <span class="text-xl">🏠</span>
                    <span>返咗屋企</span>
                </div>
            </div>
        </nav>
    </div>

    <input type="file" id="import-input" accept=".json" class="hidden" onchange="importBackup(event)">

    <script>
        let items = [];
        const STORAGE_KEY = "early_buy_items";
        let currentTab = 0;

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) items = JSON.parse(saved);
            renderItems();
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
        }

        let tempPhoto = null;

        function handlePhotoUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(ev) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    // 1:1 正方形裁剪
                    const size = Math.min(w, h);
                    canvas.width = size;
                    canvas.height = size;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, (w - size)/2, (h - size)/2, size, size, 0, 0, size, size);
                    
                    tempPhoto = canvas.toDataURL('image/jpeg', 0.8);
                    
                    // 顯示預覽
                    document.getElementById('preview-img').src = tempPhoto;
                    document.getElementById('photo-preview').classList.remove('hidden');
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        function addItem() {
            if (!tempPhoto) return alert("請先上傳照片！");
            
            items.unshift({
                id: Date.now(),
                note: document.getElementById("item-note").value.trim() || "無備註",
                photo: tempPhoto,
                paid: false,
                arrived: false,
                home: false,
                date: new Date().toISOString()
            });
            
            saveData();
            tempPhoto = null;
            document.getElementById("item-note").value = "";
            document.getElementById('photo-preview').classList.add('hidden');
            renderItems();
        }

        function toggleStatus(id, field) {
            const item = items.find(i => i.id === id);
            if (item) {
                item[field] = !item[field];
                saveData();
                renderItems();
            }
        }

        function deleteItem(id) {
            if (confirm("確定刪除？")) {
                items = items.filter(i => i.id !== id);
                saveData();
                renderItems();
            }
        }

        function renderItems() {
            const container = document.getElementById("purchase-grid");
            let filtered = items;

            if (currentTab === 1) filtered = items.filter(i => i.paid);
            if (currentTab === 2) filtered = items.filter(i => i.arrived);
            if (currentTab === 3) filtered = items.filter(i => i.home);

            container.innerHTML = filtered.length === 0 ? 
                `<div class="col-span-full text-center py-20 text-neutral-400">暫無紀錄</div>` : "";

            filtered.forEach(item => {
                const div = document.createElement("div");
                div.className = "photo-item card relative";
                div.innerHTML = `
                    <img src="${item.photo}">
                    <div class="p-3">
                        <div class="text-sm font-medium">${item.note}</div>
                        <div class="text-xs text-neutral-400 mt-1">${new Date(item.date).toLocaleDateString('zh-TW')}</div>
                    </div>
                    <div class="grid grid-cols-3 gap-1 p-2 border-t text-center text-lg">
                        <button onclick="toggleStatus(${item.id}, 'paid');event.stopImmediatePropagation()" class="py-2 rounded-xl ${item.paid ? 'bg-green-100 text-green-700' : 'bg-neutral-100'}">💸</button>
                        <button onclick="toggleStatus(${item.id}, 'arrived');event.stopImmediatePropagation()" class="py-2 rounded-xl ${item.arrived ? 'bg-blue-100 text-blue-700' : 'bg-neutral-100'}">📮</button>
                        <button onclick="toggleStatus(${item.id}, 'home');event.stopImmediatePropagation()" class="py-2 rounded-xl ${item.home ? 'bg-amber-100 text-amber-700' : 'bg-neutral-100'}">🏠</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('nav > div > div').forEach((el, i) => {
                if (i === tab) {
                    el.classList.add('nav-active');
                    el.classList.remove('text-neutral-400');
                } else {
                    el.classList.remove('nav-active');
                    el.classList.add('text-neutral-400');
                }
            });
            renderItems();
        }

        // 備份功能（保持不變）
        function showExportInfo() {
            if (items.length === 0) return alert("無紀錄可備份");
            if (confirm("即將下載備份檔案\n\n換電話時可用來還原\n確定？")) exportBackup();
        }

        function exportBackup() {
            const dataStr = JSON.stringify(items, null, 2);
            const link = document.createElement('a');
            link.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
            link.download = `早買早享受_備份_${new Date().toISOString().slice(0,10)}.json`;
            link.click();
            alert("✅ 備份已下載！");
        }

        function showImportInfo() {
            if (confirm("即將還原備份\n目前資料會被取代\n確定？")) {
                document.getElementById('import-input').click();
            }
        }

        function importBackup(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    items = JSON.parse(ev.target.result);
                    saveData();
                    renderItems();
                    alert("✅ 還原成功！");
                } catch(err) {
                    alert("檔案錯誤！");
                }
            };
            reader.readAsText(file);
        }

        function clearAllData() {
            if (confirm("確定清除所有紀錄？")) {
                localStorage.clear();
                items = [];
                renderItems();
            }
        }

        window.onload = () => {
            loadData();
            switchTab(0); // 預設顯示全部
        };
    </script>
</body>
</html>
