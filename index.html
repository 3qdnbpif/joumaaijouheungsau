<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>早買早享受</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&amp;family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans TC', 'Noto Sans JP', system-ui, sans-serif; }
        .tail-container { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #F9F7F2; }
        .card { background: white; border-radius: 20px; box-shadow: 0 4px 12px rgba(92, 107, 106, 0.08); }
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        .photo-item { position: relative; border-radius: 16px; overflow: hidden; background: white; }
        .photo-item img { width: 100%; height: 200px; object-fit: cover; cursor: pointer; } /* 3:4 垂直 */
    </style>
</head>
<body class="bg-[#F9F7F2]">
    <div class="tail-container flex flex-col">
        <header class="bg-white border-b px-6 py-5">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-bear text-3xl text-[#5C6B6A]"></i>
                    <h1 class="text-2xl font-medium">早買早享受</h1>
                </div>
                <div class="flex gap-4">
                    <button onclick="showExportInfo()" class="text-[#5C6B6A]"><i class="fa-solid fa-download"></i></button>
                    <button onclick="showImportInfo()" class="text-[#5C6B6A]"><i class="fa-solid fa-upload"></i></button>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-5 pb-24">
            <!-- 上傳區域 -->
            <div class="card p-6 mb-8">
                <h2 class="font-medium mb-4">📸 上傳新物品</h2>
                <div onclick="document.getElementById('photo-input').click()" 
                     class="border-2 border-dashed border-neutral-300 rounded-3xl h-52 flex flex-col items-center justify-center cursor-pointer hover:border-[#5C6B6A]">
                    <i class="fa-solid fa-camera text-5xl text-neutral-300 mb-3"></i>
                    <p class="text-neutral-500">拍照或選擇相片</p>
                </div>
                <input type="file" id="photo-input" accept="image/*" class="hidden" onchange="handlePhotoUpload(event)">
                
                <div id="photo-preview" class="hidden mt-4">
                    <p class="text-xs text-neutral-500 mb-2">預覽 (3:4)</p>
                    <img id="preview-img" class="w-full rounded-2xl">
                </div>
                
                <input id="item-note" type="text" placeholder="備註（可留空）" 
                       class="w-full mt-5 px-5 py-4 border border-neutral-200 rounded-2xl focus:outline-none">
                
                <button onclick="addItem()" class="w-full mt-6 bg-[#5C6B6A] text-white py-4 rounded-2xl font-medium">
                    加入紀錄
                </button>
            </div>

            <!-- 自定義分類管理 -->
            <div class="flex gap-2 mb-4">
                <input id="new-category" placeholder="新增分類名稱" 
                       class="flex-1 px-4 py-3 border border-neutral-200 rounded-2xl focus:outline-none">
                <button onclick="addCategory()" class="px-6 bg-neutral-800 text-white rounded-2xl">新增</button>
            </div>

            <div id="purchase-grid" class="photo-grid"></div>
        </main>

        <!-- 底部導航 -->
        <nav class="fixed bottom-0 left-0 right-0 max-w-[480px] mx-auto bg-white border-t">
            <div class="flex overflow-x-auto text-xs font-medium" id="category-tabs">
                <!-- JS 動態生成 -->
            </div>
        </nav>
    </div>

    <input type="file" id="import-input" accept=".json" class="hidden" onchange="importBackup(event)">

    <script>
        let items = [];
        let categories = ["全部", "未分類", "Uniqlo", "Muji", "藥妝", "零食"]; // 預設分類
        const STORAGE_KEY = "early_buy_items";
        let currentCategory = "全部";

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                items = data.items || data;
                if (data.categories) categories = data.categories;
            }
            renderCategories();
            renderItems();
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({items, categories}));
        }

        let tempPhoto = null;

        function handlePhotoUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(ev) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ratio = 3/4; // 3:4 垂直
                    let w = img.width, h = img.height;
                    
                    if (w / h > 3/4) {
                        w = h * 3/4;
                    } else {
                        h = w * 4/3;
                    }
                    
                    canvas.width = w;
                    canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    
                    tempPhoto = canvas.toDataURL('image/jpeg', 0.82);
                    document.getElementById('preview-img').src = tempPhoto;
                    document.getElementById('photo-preview').classList.remove('hidden');
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        function addItem() {
            if (!tempPhoto) return alert("請先上傳照片！");
            items.unshift({
                id: Date.now(),
                note: document.getElementById("item-note").value.trim() || "無備註",
                photo: tempPhoto,
                category: "未分類",
                date: new Date().toISOString()
            });
            saveData();
            resetUploadForm();
            renderItems();
        }

        function resetUploadForm() {
            tempPhoto = null;
            document.getElementById("item-note").value = "";
            document.getElementById('photo-preview').classList.add('hidden');
        }

        function renderCategories() {
            const container = document.getElementById("category-tabs");
            container.innerHTML = "";
            
            categories.forEach(cat => {
                const div = document.createElement("div");
                div.className = `px-5 py-3 whitespace-nowrap flex-shrink-0 ${currentCategory === cat ? 'nav-active text-[#5C6B6A]' : 'text-neutral-400'}`;
                div.textContent = cat;
                div.onclick = () => {
                    currentCategory = cat;
                    renderCategories();
                    renderItems();
                };
                container.appendChild(div);
            });
        }

        function addCategory() {
            const input = document.getElementById("new-category");
            const name = input.value.trim();
            if (name && !categories.includes(name)) {
                categories.push(name);
                saveData();
                renderCategories();
                input.value = "";
            }
        }

        function renderItems() {
            const container = document.getElementById("purchase-grid");
            let filtered = items;

            if (currentCategory !== "全部") {
                filtered = items.filter(item => item.category === currentCategory);
            }

            container.innerHTML = filtered.length === 0 ? 
                `<div class="col-span-full text-center py-20 text-neutral-400">此分類暫無紀錄</div>` : "";

            filtered.forEach(item => {
                const div = document.createElement("div");
                div.className = "photo-item card relative";
                div.innerHTML = `
                    <img src="${item.photo}" onclick="editItem(${item.id})">
                    <div class="p-3">
                        <div class="text-sm font-medium">${item.note}</div>
                        <div class="text-xs text-neutral-400 mt-1">${new Date(item.date).toLocaleDateString('zh-TW')}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // 編輯功能
        function editItem(id) {
            const item = items.find(i => i.id === id);
            if (!item) return;
            
            const newNote = prompt("修改備註：", item.note);
            if (newNote !== null) {
                item.note = newNote.trim() || "無備註";
                saveData();
                renderItems();
            }
        }

        // 備份功能
        function showExportInfo() {
            if (items.length === 0) return alert("無紀錄可備份");
            if (confirm("即將下載備份\n換電話時可用\n確定？")) exportBackup();
        }

        function exportBackup() {
            const data = {items, categories};
            const link = document.createElement('a');
            link.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(data, null, 2));
            link.download = `早買早享受_備份_${new Date().toISOString().slice(0,10)}.json`;
            link.click();
        }

        function showImportInfo() {
            if (confirm("還原備份將取代目前資料\n確定？")) document.getElementById('import-input').click();
        }

        function importBackup(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const data = JSON.parse(ev.target.result);
                    items = data.items || data;
                    if (data.categories) categories = data.categories;
                    saveData();
                    renderCategories();
                    renderItems();
                    alert("✅ 還原成功！");
                } catch(err) {
                    alert("檔案錯誤！");
                }
            };
            reader.readAsText(file);
        }

        window.onload = loadData;
    </script>
</body>
</html>
